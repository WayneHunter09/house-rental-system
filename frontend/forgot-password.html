<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Nyumba Rentals</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel">
      <a class="brand" href="index.html">Nyumba Rentals</a>
      <h1>Reset password</h1>
      <p class="muted">Enter your account email to prepare a secure reset link.</p>
      <form id="forgotPasswordForm" class="form-stack">
        <label for="forgotEmail">Email address</label>
        <input id="forgotEmail" type="email" required autocomplete="email" placeholder="you@example.com">
        <button class="button" type="submit">Send reset link</button>
      </form>
      <p class="auth-note">Remembered it? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
