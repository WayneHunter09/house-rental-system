<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Houses | Nyumba Rentals</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Nyumba Rentals</a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="houses.html">Houses</a>
      <a href="about.html">About</a>
      <a href="contacts.html">Contacts</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="page">
    <section class="section compact">
      <div class="section-title">
        <p class="eyebrow">Houses</p>
        <h1>Search available rentals</h1>
      </div>
      <form class="search-panel" id="houseSearchForm">
        <input id="searchLocation" type="text" placeholder="Location">
        <input id="searchMinRent" type="number" min="0" placeholder="Min price">
        <input id="searchMaxRent" type="number" min="0" placeholder="Max price">
        <select id="searchType">
          <option value="">Any house type</option>
          <option value="Apartment">Apartment</option>
          <option value="Bungalow">Bungalow</option>
          <option value="Bedsitter">Bedsitter</option>
          <option value="Maisonette">Maisonette</option>
        </select>
        <button class="button" type="submit">Apply filters</button>
      </form>
    </section>

    <section class="section">
      <div class="result-bar">
        <h2>Results</h2>
        <button class="text-button" id="clearFilters" type="button">Clear filters</button>
      </div>
      <div class="house-grid" id="searchResults"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
