<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Nyumba Rentals</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel">
      <a class="brand" href="index.html">Nyumba Rentals</a>
      <h1>Choose password</h1>
      <p class="muted">Create a strong new password for your account.</p>
      <form id="resetPasswordForm" class="form-stack">
        <label for="resetPassword">New password</label>
        <input id="resetPassword" type="password" required minlength="8" autocomplete="new-password" placeholder="8+ chars with A-z, 0-9, symbol">
        <small class="field-hint">Use uppercase, lowercase, a number, and a symbol.</small>
        <label for="resetPasswordConfirm">Confirm password</label>
        <input id="resetPasswordConfirm" type="password" required minlength="8" autocomplete="new-password" placeholder="Repeat new password">
        <button class="button" type="submit">Update password</button>
      </form>
      <p class="auth-note">Back to <a href="login.html">login</a></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
