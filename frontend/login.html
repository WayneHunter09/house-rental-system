<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Nyumba Rentals</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel">
      <a class="brand" href="index.html">Nyumba Rentals</a>
      <h1>Welcome back</h1>
      <p class="muted">Login to view your rental dashboard.</p>
      <form id="loginForm" class="form-stack">
        <label for="loginEmail">Email address</label>
        <input id="loginEmail" type="email" required placeholder="you@example.com">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" required placeholder="Enter password">
        <button class="button" type="submit">Login</button>
      </form>
      <p class="auth-note">New here? <a href="registrer.html">Create an account</a></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
