<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Houses | Nyumba Rentals</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Nyumba Rentals</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="search.html">Search</a>
      <a href="dashboard.html">Dashboard</a>
      <a class="button small" href="login.html">Login</a>
    </nav>
  </header>

  <main class="page">
    <section class="section compact">
      <div class="section-title">
        <p class="eyebrow">Search rentals</p>
        <h1>Find your next home</h1>
      </div>
      <form class="filters" id="searchForm">
        <input id="searchLocation" type="text" placeholder="Location">
        <select id="searchType">
          <option value="">Any type</option>
          <option value="Apartment">Apartment</option>
          <option value="Bungalow">Bungalow</option>
          <option value="Bedsitter">Bedsitter</option>
          <option value="Maisonette">Maisonette</option>
        </select>
        <input id="searchMaxRent" type="number" min="0" placeholder="Max rent">
        <button class="button" type="submit">Apply filters</button>
      </form>
    </section>

    <section class="section">
      <div class="result-bar">
        <h2>Results</h2>
        <button class="text-button" id="clearFilters" type="button">Clear filters</button>
      </div>
      <div class="property-grid" id="searchResults"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
