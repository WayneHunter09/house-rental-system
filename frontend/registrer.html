<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Nyumba Rentals</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel">
      <a class="brand" href="index.html">Nyumba Rentals</a>
      <h1>Create account</h1>
      <p class="muted">Register as a tenant or landlord.</p>
      <form id="registerForm" class="form-stack">
        <label for="registerName">Full name</label>
        <input id="registerName" type="text" required placeholder="Your name">
        <label for="registerEmail">Email address</label>
        <input id="registerEmail" type="email" required placeholder="you@example.com">
        <label for="registerRole">Account type</label>
        <select id="registerRole" required>
          <option value="tenant">Tenant</option>
          <option value="landlord">Landlord</option>
        </select>
        <label for="registerPassword">Password</label>
        <input id="registerPassword" type="password" required minlength="6" placeholder="At least 6 characters">
        <button class="button" type="submit">Register</button>
      </form>
      <p class="auth-note">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
